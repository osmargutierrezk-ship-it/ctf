<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <title>CTF – Cambiar Contraseña</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .req-item { display:flex; align-items:center; gap:8px; font-size:.82rem; color:var(--gray-500); margin-bottom:5px; }
    .req-icon { width:16px; height:16px; border-radius:50%; background:var(--gray-300); display:inline-flex; align-items:center; justify-content:center; font-size:.6rem; color:white; flex-shrink:0; }
    .req-item.ok .req-icon { background:var(--green-600); }
    .req-item.ok span { color:var(--green-600); }
    .password-toggle { position:relative; }
    .password-toggle input { padding-right: 42px; }
    .toggle-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--gray-500); font-size:.9rem; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div class="main-content">
    <header class="top-bar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        <h2>Cambiar Contraseña</h2>
      </div>
    </header>

    <main class="page-content" style="max-width:520px;">

      <!-- Force change banner -->
      <div id="force-banner" class="alert alert-warning mb-24 hidden">
        <span>⚠</span>
        <span>Debes cambiar tu contraseña antes de continuar usando el sistema.</span>
      </div>

      <div class="card">
        <div style="text-align:center; margin-bottom:28px;">
          <div style="font-size:2.2rem; margin-bottom:8px;">🔒</div>
          <h3>Actualiza tu contraseña</h3>
          <p class="text-sm mt-4">Usa una contraseña segura que no uses en otros sistemas.</p>
        </div>

        <div id="cp-alert" class="alert hidden"></div>

        <div class="form-group" id="current-pass-group">
          <label class="form-label" for="current-pass">Contraseña Actual</label>
          <div class="password-toggle">
            <input id="current-pass" type="password" class="form-input" placeholder="Tu contraseña actual" autocomplete="current-password" />
            <button class="toggle-btn" type="button" onclick="togglePass('current-pass', this)">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="new-pass">Nueva Contraseña</label>
          <div class="password-toggle">
            <input id="new-pass" type="password" class="form-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" oninput="validatePassword(this.value)" />
            <button class="toggle-btn" type="button" onclick="togglePass('new-pass', this)">👁</button>
          </div>
          <div class="strength-bar mt-8"><div id="strength-fill" class="strength-fill" style="width:0%;"></div></div>
        </div>

        <!-- Requirements -->
        <div style="background:var(--gray-50); border-radius:8px; padding:14px; margin-bottom:18px;">
          <p class="text-xs" style="color:var(--gray-500); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; font-weight:600;">Requisitos</p>
          <div class="req-item" id="req-length"><div class="req-icon">✓</div><span>Mínimo 8 caracteres</span></div>
          <div class="req-item" id="req-letter"><div class="req-icon">✓</div><span>Al menos una letra</span></div>
          <div class="req-item" id="req-number"><div class="req-icon">✓</div><span>Al menos un número</span></div>
          <div class="req-item" id="req-upper" ><div class="req-icon">✓</div><span>Al menos una mayúscula (recomendado)</span></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-pass">Confirmar Nueva Contraseña</label>
          <div class="password-toggle">
            <input id="confirm-pass" type="password" class="form-input" placeholder="Repite la contraseña" autocomplete="new-password" oninput="checkMatch()" />
            <button class="toggle-btn" type="button" onclick="togglePass('confirm-pass', this)">👁</button>
          </div>
          <div id="match-msg" class="form-hint"></div>
        </div>

        <button id="btn-change" class="btn btn-primary" style="width:100%; justify-content:center; padding:13px;" onclick="doChangePassword()">
          Actualizar Contraseña
        </button>
      </div>

    </main>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  const user = CTF.requireAuth();
  if (!user) throw new Error();

  renderSidebar('/cambiar-password.html');
  initMobileSidebar();

  // Show force-change banner if primer_login
  if (user.primer_login) {
    document.getElementById('force-banner').classList.remove('hidden');
    // Hide current password field for first login
    document.getElementById('current-pass-group').style.display = 'none';
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
  }

  function setReq(id, ok) {
    const el = document.getElementById(id);
    if (ok) el.classList.add('ok');
    else     el.classList.remove('ok');
  }

  function validatePassword(val) {
    setReq('req-length', val.length >= 8);
    setReq('req-letter', /[a-zA-Z]/.test(val));
    setReq('req-number', /[0-9]/.test(val));
    setReq('req-upper',  /[A-Z]/.test(val));

    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['#DC2626', '#DC2626', '#F97316', '#EAB308', '#22C55E', '#16A34A'];
    const fill = document.getElementById('strength-fill');
    fill.style.width = `${score * 20}%`;
    fill.style.background = colors[score] || '#E5E7EB';

    checkMatch();
  }

  function checkMatch() {
    const np = document.getElementById('new-pass').value;
    const cp = document.getElementById('confirm-pass').value;
    const msg = document.getElementById('match-msg');
    if (!cp) { msg.textContent = ''; return; }
    if (np === cp) { msg.textContent = '✓ Las contraseñas coinciden'; msg.style.color = 'var(--green-600)'; }
    else           { msg.textContent = '✕ Las contraseñas no coinciden'; msg.style.color = 'var(--red-600)'; }
  }

  async function doChangePassword() {
    const currentPass  = document.getElementById('current-pass').value;
    const newPass      = document.getElementById('new-pass').value;
    const confirmPass  = document.getElementById('confirm-pass').value;
    const btn = document.getElementById('btn-change');

    if (newPass.length < 8) {
      CTF.showAlert('cp-alert', 'La contraseña debe tener al menos 8 caracteres.', 'error');
      return;
    }
    if (!/[a-zA-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
      CTF.showAlert('cp-alert', 'La contraseña debe contener letras y números.', 'error');
      return;
    }
    if (newPass !== confirmPass) {
      CTF.showAlert('cp-alert', 'Las contraseñas no coinciden.', 'error');
      return;
    }
    if (!user.primer_login && !currentPass) {
      CTF.showAlert('cp-alert', 'Debes ingresar tu contraseña actual.', 'error');
      return;
    }

    CTF.setButtonLoading(btn, true, 'Actualizando...');
    CTF.hideAlert('cp-alert');

    try {
      await CTF.post('/auth/change-password', {
        nuevaPassword: newPass,
        confirmarPassword: confirmPass,
        ...(currentPass ? { passwordActual: currentPass } : {}),
      });

      CTF.showAlert('cp-alert', '¡Contraseña actualizada! Por favor inicia sesión nuevamente.', 'success');
      CTF.clearSession();

      setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    } catch (err) {
      CTF.showAlert('cp-alert', err.message, 'error');
    } finally {
      CTF.setButtonLoading(btn, false, 'Actualizar Contraseña');
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doChangePassword();
  });
</script>
</body>
</html>
