<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <title>CTF – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Main -->
  <div class="main-content">
    <header class="top-bar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        <h2>Dashboard</h2>
      </div>
      <div class="top-bar-actions">
        <span id="top-date" class="text-sm" style="color:var(--gray-500);"></span>
      </div>
    </header>

    <main class="page-content">
      <div id="welcome-banner" class="card mb-24" style="background:linear-gradient(135deg,var(--purple-800),var(--purple-600)); color:white; border:none;">
        <h2 id="welcome-msg" style="color:white; font-size:1.3rem;">Bienvenido</h2>
        <p id="welcome-sub" style="color:rgba(255,255,255,.7); margin-top:4px;"></p>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-label">Total Solicitudes</div>
          <div class="stat-icon">📋</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-num" id="stat-pendiente">—</div>
          <div class="stat-label">Pendientes</div>
          <div class="stat-icon">⏳</div>
        </div>
        <div class="stat-card" style="border-top-color:var(--orange-400);">
          <div class="stat-num" id="stat-en-proceso" style="color:var(--orange-600);">—</div>
          <div class="stat-label">En Proceso</div>
          <div class="stat-icon">🔄</div>
        </div>
        <div class="stat-card green">
          <div class="stat-num" id="stat-recibido">—</div>
          <div class="stat-label">Recibidas</div>
          <div class="stat-icon">✅</div>
        </div>
      </div>

      <!-- Recent -->
      <div class="card">
        <div class="card-header">
          <h3>Solicitudes Recientes</h3>
          <a href="/mis-solicitudes.html" class="btn btn-outline btn-sm">Ver todas →</a>
        </div>
        <div id="recent-list">
          <div class="empty-state">
            <div class="spinner" style="border-color:var(--gray-300); border-top-color:var(--purple-600); width:28px; height:28px; margin:0 auto 12px;"></div>
            <p>Cargando solicitudes...</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  const user = CTF.requireAuth();
  if (user) {
    renderSidebar('/dashboard.html');
    initMobileSidebar();

    // Set date
    document.getElementById('top-date').textContent = new Intl.DateTimeFormat('es-GT', {
      weekday: 'long', day: 'numeric', month: 'long',
      timeZone: 'America/Guatemala',
    }).format(new Date());

    // Welcome
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Buenos días' : hour < 18 ? 'Buenas tardes' : 'Buenas noches';
    document.getElementById('welcome-msg').textContent = `${greeting}, ${user.nombre} 👋`;
    document.getElementById('welcome-sub').textContent = user.rol === 'CONTADOR'
      ? 'Gestiona el traslado de documentos a tesorería desde aquí.'
      : 'Revisa las solicitudes pendientes de recepción.';

    // Load stats + recent
    async function loadDashboard() {
      try {
        const [stats, recent] = await Promise.all([
          CTF.get('/solicitudes/stats'),
          CTF.get('/solicitudes?limit=5'),
        ]);
        document.getElementById('stat-total').textContent = stats.total ?? 0;
        document.getElementById('stat-pendiente').textContent  = stats.pendientes  ?? 0;
        document.getElementById('stat-en-proceso').textContent = stats.en_proceso ?? 0;
        document.getElementById('stat-recibido').textContent = stats.recibidos ?? 0;

        const container = document.getElementById('recent-list');
        if (!recent.solicitudes || recent.solicitudes.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <p>No hay solicitudes todavía</p>
              ${user.rol === 'CONTADOR'
                ? '<a href="/nueva-solicitud.html" class="btn btn-primary btn-sm" style="margin-top:12px;">Crear primera solicitud</a>'
                : ''}
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Enviado por</th>
                  <th>Docs</th>
                  <th>Estado</th>
                  <th>Fecha</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${recent.solicitudes.map(s => `
                  <tr>
                    <td><code style="font-size:.78rem; color:var(--purple-700);">${CTF.shortId(s.id_unico)}</code></td>
                    <td>${s.usuario_nombre || '—'}</td>
                    <td><span class="badge" style="background:var(--purple-100);color:var(--purple-700);">${s.documentos.length}</span></td>
                    <td><span class="badge badge-${s.estado.toLowerCase()}">${s.estado}</span></td>
                    <td class="text-xs" style="color:var(--gray-500);">${CTF.formatDate(s.fecha_creacion)}</td>
                    <td>
                      <a href="/mis-solicitudes.html?id=${s.id_unico}" class="btn btn-outline btn-sm">Ver</a>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        document.getElementById('recent-list').innerHTML = `
          <div class="alert alert-error">No se pudo cargar la información: ${err.message}</div>`;
      }
    }

    loadDashboard();
  }
</script>
</body>
</html>
