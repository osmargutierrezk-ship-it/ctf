services:
  # ── Web Service ─────────────────────────────────────────────────────────────
  - type: web
    name: ctf-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon         # Cambia a: ohio, singapore, frankfurt, etc.
    plan: free             # Cambia a "starter" o "standard" para producción

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ctf-db
          property: connectionString
      - key: APP_URL
        sync: false        # Se configura manualmente en Render Dashboard
      - key: JWT_SECRET
        generateValue: true

    healthCheckPath: /api/health
    autoDeploy: true

  # ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: ctf-db
    databaseName: ctf_db
    user: ctf_user
    region: oregon
    plan: free             # Cambia a "starter" para producción
